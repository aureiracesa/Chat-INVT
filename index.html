<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soporte Técnico INVT Ibérica</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
  .container { width: 100%; max-width: 500px; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.12); display: flex; flex-direction: column; height: 90vh; max-height: 720px; }
  .header { background: #1F3864; padding: 16px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .avatar { width: 42px; height: 42px; border-radius: 50%; background: #2E75B6; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: white; flex-shrink: 0; }
  .header-info { flex: 1; }
  .header-name { color: white; font-size: 15px; font-weight: 600; }
  .header-sub { color: #BDD7EE; font-size: 12px; margin-top: 2px; }
  .online-dot { width: 9px; height: 9px; border-radius: 50%; background: #4CAF50; flex-shrink: 0; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #f0f2f5; }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg.bot { justify-content: flex-start; }
  .bubble { padding: 10px 14px; max-width: 82%; font-size: 14px; line-height: 1.55; word-wrap: break-word; }
  .bubble.user { background: #2E75B6; color: white; border-radius: 16px 2px 16px 16px; }
  .bubble.bot { background: white; color: #1a1a1a; border-radius: 2px 16px 16px 16px; border: 1px solid #e4e4e4; white-space: pre-wrap; }
  .bubble.typing { background: white; border: 1px solid #e4e4e4; border-radius: 2px 16px 16px 16px; color: #888; font-style: italic; font-size: 13px; }
  .quick-btns { padding: 8px 12px; display: flex; gap: 6px; flex-wrap: wrap; background: white; border-top: 1px solid #f0f0f0; flex-shrink: 0; }
  .quick-btn { font-size: 12px; padding: 5px 11px; background: #f0f4fb; border: 1px solid #d0dff5; border-radius: 20px; cursor: pointer; color: #1F3864; font-weight: 500; transition: background 0.15s; }
  .quick-btn:hover { background: #d0dff5; }
  .input-area { padding: 12px 16px; border-top: 1px solid #e8e8e8; display: flex; gap: 8px; background: white; flex-shrink: 0; }
  input[type=text] { flex: 1; padding: 10px 14px; font-size: 14px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-family: inherit; transition: border 0.2s; }
  input[type=text]:focus { border-color: #2E75B6; }
  button.send { padding: 10px 20px; background: #1F3864; color: white; border: none; border-radius: 24px; font-size: 14px; cursor: pointer; font-weight: 500; transition: background 0.15s; white-space: nowrap; }
  button.send:hover { background: #2E75B6; }
  button.send:disabled { background: #aaa; cursor: default; }
  .footer { text-align: center; padding: 6px; font-size: 11px; color: #aaa; background: white; flex-shrink: 0; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="avatar">IN</div>
    <div class="header-info">
      <div class="header-name">Soporte Técnico INVT Ibérica</div>
      <div class="header-sub">GD100 · BPD · SP100</div>
    </div>
    <div class="online-dot"></div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="bubble bot">Hola 👋 Soy el asistente técnico de INVT Ibérica. Puedo ayudarte con los variadores GD100, BPD y SP100.

Cuéntame tu consulta o usa los accesos rápidos de abajo.</div>
    </div>
  </div>

  <div class="quick-btns">
    <button class="quick-btn" onclick="quickSend('Tengo un BPD con error A-LS, qué hago')">BPD · A-LS</button>
    <button class="quick-btn" onclick="quickSend('GD100 error OC1 al arrancar')">GD100 · OC1</button>
    <button class="quick-btn" onclick="quickSend('Cómo poner en marcha una bomba monofásica con BPD')">BPD · Monofásica</button>
    <button class="quick-btn" onclick="quickSend('SP100 no arranca automáticamente por la mañana')">SP100 · Arranque</button>
    <button class="quick-btn" onclick="quickSend('BPD error PVOV qué significa')">BPD · PVOV</button>
  </div>

  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Escribe tu consulta técnica..." />
    <button class="send" id="sendBtn" onclick="sendMessage()">Enviar</button>
  </div>

  <div class="footer">INVT Ibérica · Soporte técnico IA · Uso interno</div>

</div>

<script>
const WEBHOOK = 'https://hook.eu1.make.com/b5jalpvo6b83vrtsiifi1t81kehsxodb';

function addMsg(text, who) {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg ' + who;
  const b = document.createElement('div');
  b.className = 'bubble ' + who;
  b.innerText = text;
  row.appendChild(b);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function addTyping() {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg bot';
  row.id = 'typing-row';
  const b = document.createElement('div');
  b.className = 'bubble typing';
  b.innerText = 'Consultando manuales INVT...';
  row.appendChild(b);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');
  addTyping();
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  try {
    const res = await fetch(WEBHOOK + '?Body=' + encodeURIComponent(text));
    const raw = await res.text();
    document.getElementById('typing-row')?.remove();

    let reply = raw;
    try {
      const j = JSON.parse(raw);
      reply = j.text || j.output || j.message || raw;
    } catch(e) {}

    if (typeof reply === 'object') reply = JSON.stringify(reply);
    addMsg(reply, 'bot');
  } catch(e) {
    document.getElementById('typing-row')?.remove();
    addMsg('Error de conexión. Verifica que el escenario de Make está activo.', 'bot');
  }
  btn.disabled = false;
  input.focus();
}

document.getElementById('msgInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendMessage();
});

function quickSend(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}
</script>
</body>
</html>
